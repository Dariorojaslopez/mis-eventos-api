services:
  postgres:
    image: postgres:16-alpine
    container_name: mis_eventos_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mis_eventos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mis_eventos"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - mis_eventos_net

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: mis_eventos_backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/mis_eventos
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
      - ./pyproject.toml:/app/pyproject.toml
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mis_eventos_net
    command: >
      sh -c "uv run alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  postgres_data:

networks:
  mis_eventos_net:
    driver: bridge
