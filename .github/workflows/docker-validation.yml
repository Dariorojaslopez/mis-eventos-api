name: Docker Validation

on:
  push:
    branches: [main, develop, master]
    paths:
      - "app/**"
      - "Dockerfile"
      - "scripts/**"
      - "docker-compose.yml"
      - "docker-compose.test.yml"
      - ".github/workflows/docker-validation.yml"
      - ".github/actions/setup-backend/**"
  pull_request:
    branches: [main, develop, master]
    paths:
      - "app/**"
      - "Dockerfile"
      - "scripts/**"
      - "docker-compose.yml"
      - "docker-compose.test.yml"
      - ".github/workflows/docker-validation.yml"
      - ".github/actions/setup-backend/**"

concurrency:
  group: docker-validation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  WORKING_DIRECTORY: .
  IMAGE_NAME: mis-eventos-backend
  SECRET_KEY: ci-test-secret-key-minimum-32-characters-long
  DATABASE_URL: postgresql+asyncpg://postgres:postgres@host.docker.internal:5432/mis_eventos_ci

permissions:
  contents: read

jobs:
  docker-build:
    name: Docker Build & Health
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: true
      matrix:
        target: [development, production]
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIRECTORY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (${{ matrix.target }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: ${{ matrix.target }}
          tags: ${{ env.IMAGE_NAME }}:${{ matrix.target }}-ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-compose:
    name: Docker Compose Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: docker-build
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIRECTORY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build docker-compose.yml
        run: docker compose build

      - name: Build docker-compose.test.yml
        run: docker compose -f docker-compose.test.yml build

  production-healthcheck:
    name: Production Healthcheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: docker-build
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mis_eventos_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d mis_eventos_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 10s
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build production image
        run: docker build --target production -t ${{ env.IMAGE_NAME }}:health-ci .

      - name: Run container and verify /health
        run: |
          # La imagen production ejecuta alembic antes de uvicorn; requiere PostgreSQL accesible.
          docker run -d --name mis-eventos-health \
            --add-host=host.docker.internal:host-gateway \
            -e SECRET_KEY="${{ env.SECRET_KEY }}" \
            -e DATABASE_URL="${{ env.DATABASE_URL }}" \
            -e ENVIRONMENT=production \
            -e AI_PROVIDER=mock \
            -p 18000:8000 \
            ${{ env.IMAGE_NAME }}:health-ci

          for i in $(seq 1 45); do
            if curl -fsS http://localhost:18000/health; then
              echo "Healthcheck OK (attempt ${i})"
              docker stop mis-eventos-health
              docker rm mis-eventos-health
              exit 0
            fi
            sleep 2
          done

          echo "Healthcheck failed after 90s"
          docker logs mis-eventos-health
          docker stop mis-eventos-health || true
          docker rm mis-eventos-health || true
          exit 1
