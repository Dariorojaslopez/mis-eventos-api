name: Backend CI

on:
  push:
    branches: [main, develop, master]
    paths:
      - "app/**"
      - "alembic/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/backend-ci.yml"
      - ".github/actions/setup-backend/**"
  pull_request:
    branches: [main, develop, master]
    paths:
      - "app/**"
      - "alembic/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/backend-ci.yml"
      - ".github/actions/setup-backend/**"

concurrency:
  group: backend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  WORKING_DIRECTORY: .
  ENVIRONMENT: test
  AI_PROVIDER: mock
  SECRET_KEY: ci-test-secret-key-minimum-32-characters-long
  TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/mis_eventos_test

permissions:
  contents: read

jobs:
  lint-and-format:
    name: Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIRECTORY }}
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.12"]
        # Preparado para ampliar: python-version: ["3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup backend
        uses: ./.github/actions/setup-backend
        with:
          python-version: ${{ matrix.python-version }}
          sync-dev: "true"

      - name: Ruff lint
        run: uv run ruff check app

      - name: Ruff format check
        run: uv run ruff format --check app

      - name: Black check
        run: uv run black --check app

  test:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    needs: lint-and-format
    timeout-minutes: 20
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIRECTORY }}
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.12"]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mis_eventos_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d mis_eventos_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 10s
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup backend
        uses: ./.github/actions/setup-backend
        with:
          python-version: ${{ matrix.python-version }}
          sync-dev: "true"

      - name: Wait for PostgreSQL
        run: |
          uv run python <<'PY'
          import asyncio
          import sys

          import asyncpg

          async def wait_for_db() -> None:
              for attempt in range(1, 31):
                  try:
                      conn = await asyncpg.connect(
                          "postgresql://postgres:postgres@localhost:5432/mis_eventos_test"
                      )
                      await conn.close()
                      print(f"PostgreSQL is ready (attempt {attempt})")
                      return
                  except Exception as exc:
                      print(f"Waiting for PostgreSQL... ({attempt}/30): {exc}")
                      await asyncio.sleep(2)
              sys.exit("PostgreSQL did not become ready in time")

          asyncio.run(wait_for_db())
          PY

      - name: Run pytest with coverage
        env:
          TEST_DATABASE_URL: ${{ env.TEST_DATABASE_URL }}
          SECRET_KEY: ${{ env.SECRET_KEY }}
          ENVIRONMENT: ${{ env.ENVIRONMENT }}
          AI_PROVIDER: ${{ env.AI_PROVIDER }}
        run: >
          uv run pytest
          --cov=app
          --cov-report=term-missing
          --cov-report=html
          --cov-report=xml
          --cov-fail-under=50

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: |
            htmlcov/
            coverage.xml
          retention-days: 14
          if-no-files-found: warn
