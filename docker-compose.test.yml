services:
  postgres-test:
    image: postgres:16-alpine
    container_name: mis_eventos_postgres_test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mis_eventos_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mis_eventos_test"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  test:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: mis_eventos_test_runner
    env_file:
      - .env
    environment:
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres-test:5432/mis_eventos_test
      SECRET_KEY: test-secret-key-for-ci-minimum-32-characters
      AI_PROVIDER: mock
    volumes:
      - ./app:/app/app
      - ./pyproject.toml:/app/pyproject.toml
      - ./uv.lock:/app/uv.lock
    depends_on:
      postgres-test:
        condition: service_healthy
    command: >
      uv run pytest --cov=app --cov-report=term-missing --cov-report=html
